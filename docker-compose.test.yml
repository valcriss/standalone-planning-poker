services:
  postgres:
    image: postgres:16-alpine
    container_name: planning-poker-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: planning_poker
    ports:
      - "5434:5432"
    volumes:
      - planning-poker-postgres-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d planning_poker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: standalone-planning-poker:local-test
    container_name: planning-poker-app-test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/planning_poker
      JWT_ACCESS_SECRET: change-me-access-secret-1234
      JWT_REFRESH_SECRET: change-me-refresh-secret-1234
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL_DAYS: 7
      REFRESH_COOKIE_NAME: pp_refresh_token
      APP_BASE_URL: http://localhost:3333
      OIDC_ENABLED: "false"
      OIDC_ISSUER_URL: ""
      OIDC_CLIENT_ID: ""
      OIDC_CLIENT_SECRET: ""
      OIDC_REDIRECT_URI: ""
      JIRA_CREDENTIALS_ENCRYPTION_KEY: change-me-jira-credentials-key-1234
      JIRA_DEFAULT_STORY_POINTS_FIELD_ID: customfield_10016
      AUTO_CLOSE_AFTER_MS: 300000
      CLOSING_DURATION_MS: 60000
    ports:
      - "3333:3333"

volumes:
  planning-poker-postgres-test:
